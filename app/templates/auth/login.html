{% extends "base.html" %}

{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center py-5">
    <div class="col-11 col-sm-8 col-md-5 col-lg-4 col-xl-3">

        <div class="text-center mb-4">
            <div class="brand-icon rounded-3 d-inline-flex align-items-center justify-content-center mb-3">
                <i class="bi bi-building-check text-white fs-4"></i>
            </div>
            <h4 class="fw-bold mb-1">Welcome Back</h4>
            <p class="section-description mb-0">Sign in to access your DLP Advisor dashboard.</p>
        </div>

        <div class="card auth-card">
            <div class="card-body">
                <form action="{{ url_for('auth.login') }}" method="POST">

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email Address</label>
                        <input type="email" name="email" class="form-control" placeholder="name@example.com" required
                            autocomplete="email">
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="••••••••" required
                            autocomplete="current-password">
                    </div>

                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-primary py-2 fw-semibold">
                            Sign In <i class="bi bi-arrow-right ms-2"></i>
                        </button>
                    </div>

                    <div class="text-center">
                        <small class="text-muted">
                            New Homeowner?
                            <a href="{{ url_for('auth.register') }}" class="fw-semibold text-primary">Create Account</a>
                        </small>
                    </div>

                </form>
            </div>
        </div>

        <p class="text-center text-muted mt-4" style="font-size:0.75rem;">
            DLP Advisor &copy; 2025 &mdash; Housing Defect Management
        </p>

    </div>
</div>
{% endblock %}
