{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5 col-lg-4">

        <!-- Header -->
        <div class="text-center mb-4">
            <h3 class="fw-bold" style="font-family:'Montserrat',sans-serif; color:var(--text-primary, #1E293B);">Welcome
                Back</h3>
            <p class="small mb-0" style="color:var(--text-secondary, #475569);">Sign in to access your DLP Dashboard</p>
        </div>

        <!-- Login Card -->
        <div class="card p-4" style="background-color:var(--bg-card, #ffffff);
                    border-radius:10px;
                    box-shadow:0 4px 6px rgba(0,0,0,0.1);
                    border:1px solid var(--border-color, #e2e8f0);">
            <div class="card-body p-0">

                <!-- Flash messages handled by base.html Toasts -->

                <form action="{{ url_for('auth.login') }}" method="POST">

                    <div class="mb-3">
                        <label class="form-label fw-semibold"
                            style="font-family:'Open Sans',sans-serif; color:var(--text-primary, #1E293B); font-size:0.875rem;">Email</label>
                        <input type="email" name="email" class="form-control" placeholder="name@example.com" required
                            style="background-color:#F8F9FA;
                                      color:#1E293B;
                                      border:1px solid #CBD5E1;
                                      border-radius:6px;
                                      padding:0.75rem 1rem;
                                      font-family:'Open Sans',sans-serif;">
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold"
                            style="font-family:'Open Sans',sans-serif; color:var(--text-primary, #1E293B); font-size:0.875rem;">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="••••••••" required
                            style="background-color:#F8F9FA;
                                      color:#1E293B;
                                      border:1px solid #CBD5E1;
                                      border-radius:6px;
                                      padding:0.75rem 1rem;
                                      font-family:'Open Sans',sans-serif;">
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn py-2 fw-bold" style="background-color:var(--primary-blue, #2563EB);
                                       color:#FFFFFF;
                                       border:none;
                                       border-radius:6px;
                                       font-family:'Montserrat',sans-serif;
                                       font-size:0.95rem;
                                       letter-spacing:0.02em;
                                       transition:background-color 0.2s ease;">Sign In</button>
                    </div>

                    <div class="mt-3 text-center">
                        <small style="color:var(--text-secondary, #475569); font-family:'Open Sans',sans-serif;">
                            New Homeowner?
                            <a href="{{ url_for('auth.register') }}"
                                style="color:var(--primary-blue, #2563EB); text-decoration:none; font-weight:600;">
                                Create Account
                            </a>
                        </small>
                    </div>

                </form>
            </div>
        </div>

    </div>
</div>

<style>
    /* ── Login-specific input overrides ── */
    .login-input,
    form input[type="email"],
    form input[type="password"] {
        background-color: #F8F9FA !important;
        color: #1E293B !important;
        border: 1px solid #CBD5E1 !important;
        border-radius: 6px !important;
    }

    form input[type="email"]::placeholder,
    form input[type="password"]::placeholder {
        color: #94A3B8 !important;
        opacity: 1;
    }

    form input[type="email"]:focus,
    form input[type="password"]:focus {
        background-color: #FFFFFF !important;
        color: #1E293B !important;
        border-color: #2563EB !important;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15) !important;
        outline: none;
    }

    /* ── Sign In button hover ── */
    form .btn[type="submit"]:hover {
        background-color: #1D4ED8 !important;
        box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
    }
</style>
{% endblock %}
