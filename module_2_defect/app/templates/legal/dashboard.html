<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legal Gateway - LIDAR Defect Viewer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: system-ui, sans-serif;
            margin: 0;
            padding: 0;
            background: #f3f4f6;
            color: #1e293b;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .gateway-card {
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        .gateway-card h1 {
            margin-top: 0;
            font-size: 24px;
            color: #0f172a;
        }

        .gateway-card p {
            color: #64748b;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .btn-massive {
            display: inline-block;
            background: linear-gradient(135deg, #7c3aed, #22d3ee);
            color: #ffffff;
            text-decoration: none;
            padding: 20px 40px;
            border-radius: 12px;
            font-size: 20px;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.4);
        }

        .btn-massive:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(124, 58, 237, 0.6);
        }

        .icon-container {
            font-size: 48px;
            color: #7c3aed;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <div class="gateway-card">
        <div class="icon-container">
            <i class="fas fa-balance-scale"></i>
        </div>
        <h1>Legal Compliance Gateway</h1>
        <p>Access the unified reporting dashboard to review compliance reports, tribunal forms, and defect evidence for
            all active projects.</p>

        <!-- Link defaults to dashboard root with role Legal, letting the Service route them appropriately -->
        <a href="http://localhost:5003/?role=Legal" class="btn-massive">
            <i class="fas fa-external-link-alt"></i> Go to Reporting Dashboard
        </a>
    </div>
</body>

</html>
